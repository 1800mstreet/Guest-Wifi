<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>1800M Guest WiFi</title>
<style>
  html, body { margin: 0; padding: 0; background: #ffffff; font-family: Arial, Helvetica, sans-serif; }
  .page { position: relative; width: min(100vw, 750px); aspect-ratio: 750 / 1334; margin: 0 auto; background-image: url('assets/login-background.png'); background-repeat: no-repeat; background-position: top center; background-size: 100% 100%; overflow: hidden; }
  form { margin: 0; padding: 0; }
  .wifi-input { position: absolute; left: 12.8%; width: 74.2%; height: 5.85%; box-sizing: border-box; border: 2px solid #a8a8a8; background: #ffffff; color: #111111; font-size: clamp(12px, 3.4vw, 26px); line-height: 1; padding: 0 3%; border-radius: 0; outline: none; font-family: Arial, Helvetica, sans-serif; }
  .wifi-input::placeholder { color: #8a8a8a; opacity: 1; }
  .wifi-input:focus { border-color: #777777; }
  #firstName { top: 32.7%; } #lastName { top: 41.55%; } #email { top: 50.55%; } #phone { top: 59.35%; }
  .connect-btn { position: absolute; left: 12.55%; top: 70.48%; width: 74.65%; height: 6.68%; border: 0; background: #004a57; color: #ffffff; font-size: clamp(18px, 5.1vw, 38px); font-family: Arial, Helvetica, sans-serif; cursor: pointer; }
  .terms-click-area { position: absolute; left: 26%; bottom: 2%; width: 48%; height: 5%; z-index: 9999; display: block; }
  </style>
</head>
<body>
  <main class="page">
    <form id="wifiForm">
      <input class="wifi-input" id="firstName" name="first_name" type="text" placeholder="First name" autocomplete="given-name" required />
      <input class="wifi-input" id="lastName" name="last_name" type="text" placeholder="Last name" autocomplete="family-name" required />
      <input class="wifi-input" id="email" name="email" type="email" placeholder="Email" autocomplete="email" required />
      <input class="wifi-input" id="phone" name="phone" type="tel" placeholder="Phone" autocomplete="tel" required />
      <button class="connect-btn" type="submit">Connect</button>
    </form>
    <a class="terms-click-area" href="terms.html" aria-label="Terms and Conditions"></a>
    </main>
<script>
(function () {
  const form = document.getElementById('wifiForm');
  function getParam(name) { return new URLSearchParams(window.location.search).get(name) || ''; }
  form.addEventListener('submit', function (event) {
    event.preventDefault();
    if (!form.checkValidity()) { form.reportValidity(); return; }
    const guestInfo = {
      first_name: document.getElementById('firstName').value.trim(),
      last_name: document.getElementById('lastName').value.trim(),
      email: document.getElementById('email').value.trim(),
      phone: document.getElementById('phone').value.trim(),
      submitted_at: new Date().toISOString()
    };
    try { sessionStorage.setItem('guest_wifi_info', JSON.stringify(guestInfo)); } catch (e) {}
    const baseGrantUrl = getParam('base_grant_url');
    const continueUrl = getParam('user_continue_url') || 'https://www.google.com/';
    if (baseGrantUrl) {
      const separator = baseGrantUrl.includes('?') ? '&' : '?';
      window.location.href = baseGrantUrl + separator + 'continue_url=' + encodeURIComponent(continueUrl);
    } else {
     }
  });
})();
</script>
</body>
</html>
