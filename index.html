<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>1800M Guest WiFi</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; font-family: Arial, Helvetica, sans-serif; }
    body {
      background: #fff url('assets/login-background.png') center top / cover no-repeat;
      display: flex;
      justify-content: center;
    }
    .page {
      width: 750px;
      min-height: 1334px;
      position: relative;
      background: url('assets/login-background.png') center top / cover no-repeat;
      overflow: hidden;
    }
    .logo {
      width: 590px;
      display: block;
      margin: 58px auto 28px;
    }
    .form-box {
      width: 642px;
      margin: 0 auto;
      padding: 58px 40px 62px;
      background: rgba(255, 255, 255, 0.82);
    }
    input {
      display: block;
      width: 100%;
      height: 79px;
      margin-bottom: 40px;
      padding: 0 22px;
      border: 2px solid #aaa;
      font-size: 26px;
      color: #333;
      background: rgba(255,255,255,0.95);
    }
    input::placeholder { color: #8b8b8b; }
    button {
      width: 100%;
      height: 88px;
      margin-top: 28px;
      border: 0;
      background: #064a56;
      color: #fff;
      font-size: 36px;
      cursor: pointer;
    }
    .terms-link {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 20px;
      text-align: center;
      font-size: 32px;
    }
    .terms-link a { color: #004eea; text-decoration: underline; }
    @media (max-width: 760px) {
      body { display: block; }
      .page { width: 100vw; min-height: 100vh; }
      .logo { width: 79vw; margin-top: 7.7vw; margin-bottom: 3.7vw; }
      .form-box { width: 85.6vw; padding: 7.7vw 5.3vw 8.3vw; }
      input { height: 10.5vw; margin-bottom: 5.3vw; padding: 0 2.9vw; font-size: 3.45vw; }
      button { height: 11.7vw; margin-top: 3.7vw; font-size: 4.8vw; }
      .terms-link { font-size: 4.25vw; bottom: 2.7vw; }
    }
  </style>
</head>
<body>
  <main class="page">
    <img class="logo" src="assets/1800m-header.png" alt="1800M ST" />
    <form class="form-box" method="GET" action="http://www.msftconnecttest.com/redirect">
      <input type="text" name="first_name" placeholder="First name" required />
      <input type="text" name="last_name" placeholder="Last name" required />
      <input type="email" name="email" placeholder="Email" required />
      <input type="tel" name="phone" placeholder="Phone" required />
      <button type="submit">Connect</button>
    </form>
    <div class="terms-link"><a href="terms.html">Terms and Conditions</a></div>
  </main>
</body>
</html>
