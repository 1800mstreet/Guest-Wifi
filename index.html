<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=750, initial-scale=1.0" />
  <title>1800M ST Wi-Fi</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #ffffff;
      font-family: Arial, Helvetica, sans-serif;
    }

    .page {
      width: 750px;
      min-height: 1334px;
      margin: 0 auto;
      position: relative;
      overflow: hidden;
      background: #ffffff;
      border-left: 1px solid #ffffff;
      border-right: 1px solid #ffffff;
      box-sizing: border-box;
    }

    .bg {
      position: absolute;
      inset: 0;
      background-image: url('assets/1800m-header.png');
      background-size: cover;
      background-position: center top;
      filter: none;
      transform: scale(3.15);
      transform-origin: top center;
      opacity: 1;
    }

    .logo {
      position: relative;
      z-index: 2;
      width: 100%;
      height: 260px;
      background-image: url('assets/1800m-header.png');
      background-size: cover;
      background-position: center top;
    }

    .form-box {
      position: relative;
      z-index: 2;
      width: 640px;
      margin: 101px auto 0 auto;
      padding: 72px 40px 62px 40px;
      box-sizing: border-box;
      background: rgba(255,255,255,0.86);
    }

    input[type="text"], input[type="email"], input[type="tel"] {
      width: 100%;
      height: 80px;
      margin: 0 0 39px 0;
      padding: 0 22px;
      box-sizing: border-box;
      border: 2px solid #a9a9a9;
      background: #ffffff;
      font-size: 25px;
      color: #222;
      outline: none;
    }

    input::placeholder {
      color: #8e8e8e;
      opacity: 1;
    }

    .connect {
      width: 100%;
      height: 88px;
      margin-top: 29px;
      border: 0;
      background: #064757;
      color: #ffffff;
      font-size: 36px;
      font-weight: 400;
      cursor: pointer;
    }

    .terms-link {
      position: relative;
      z-index: 2;
      display: block;
      margin-top: 190px;
      text-align: center;
      color: #0047ff;
      font-size: 36px;
      text-decoration: underline;
      background: #ffffff;
      padding: 25px 0 18px 0;
    }

    @media (max-width: 750px) {
      .page { width: 100vw; min-height: 100vh; }
      .form-box { width: calc(100vw - 110px); }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="bg"></div>
    <div class="logo"></div>

    <form class="form-box">
      <input type="text" placeholder="First name" required>
      <input type="text" placeholder="Last name" required>
      <input type="email" placeholder="Email" required>
      <input type="tel" placeholder="Phone">
      <button class="connect" type="submit">Connect</button>
    </form>

    <a class="terms-link" href="terms.html">Terms and Conditions</a>
  </main>
</body>
</html>
