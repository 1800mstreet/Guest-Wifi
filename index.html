<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>1800M Guest WiFi</title>
  <style>
    html, body { margin:0; min-height:100%; background:#fff; font-family: Arial, Helvetica, sans-serif; }
    .page { width:750px; height:1334px; margin:0 auto; position:relative; background:url('assets/login-background.png') top center / 750px 1334px no-repeat; }
    form { position:absolute; left:0; top:0; width:750px; height:1334px; }
    input { position:absolute; left:96px; width:557px; height:78px; box-sizing:border-box; border:0; outline:0; background:transparent; color:#333; font-size:25px; padding:0 24px; }
    input::placeholder { color:transparent; }
    #first { top:436px; }
    #last { top:554px; }
    #email { top:674px; }
    #phone { top:793px; }
    button { position:absolute; left:94px; top:939px; width:560px; height:88px; border:0; background:transparent; color:transparent; cursor:pointer; }
    .terms-link { position:absolute; left:0; top:1277px; width:750px; height:45px; display:block; }
    @media (max-width: 750px) {
      .page { width:100vw; height:177.8667vw; background-size:100vw 177.8667vw; }
      form { width:100%; height:100%; }
      input { left:12.8vw; width:74.27vw; height:10.4vw; font-size:3.33vw; padding:0 3.2vw; }
      #first { top:58.13vw; }
      #last { top:73.87vw; }
      #email { top:89.87vw; }
      #phone { top:105.73vw; }
      button { left:12.53vw; top:125.2vw; width:74.67vw; height:11.73vw; }
      .terms-link { top:170.27vw; width:100%; height:6vw; }
    }
  </style>
</head>
<body>
  <div class="page">
    <form id="wifiForm">
      <input id="first" name="first_name" type="text" placeholder="First name" required autocomplete="given-name">
      <input id="last" name="last_name" type="text" placeholder="Last name" required autocomplete="family-name">
      <input id="email" name="email" type="email" placeholder="Email" required autocomplete="email">
      <input id="phone" name="phone" type="tel" placeholder="Phone" required autocomplete="tel">
      <button type="submit">Connect</button>
    </form>
    <a class="terms-link" href="terms.html" aria-label="Terms and Conditions"></a>
  </div>
  <script>
    document.getElementById('wifiForm').addEventListener('submit', function(e) {
      e.preventDefault();
      if (!this.checkValidity()) { this.reportValidity(); return; }
      const p = new URLSearchParams(window.location.search);
      const userContinue = p.get('user_continue_url') || p.get('continue_url') || p.get('redirect_url') || 'https://www.google.com';
      const baseGrant = p.get('base_grant_url');
      if (baseGrant) {
        window.location.href = baseGrant + '?continue_url=' + encodeURIComponent(userContinue);
      } else {
        window.location.href = userContinue;
      }
    });
  </script>
</body>
</html>
